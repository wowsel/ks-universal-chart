suite: test example app
templates:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - httproute.yaml
tests:
  - it: should render a complete example web application
    set:
      deployments:
        web-app:
          replicas: 2
          autoCreateService: true
          autoCreateIngress: true
          containers:
            main:
              image: nginx
              imageTag: 1.21
              ports:
                http:
                  containerPort: 80
                  servicePort: 80
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
              probes:
                livenessProbe:
                  httpGet:
                    path: /health
                    port: http
                  initialDelaySeconds: 10
                  periodSeconds: 30
                readinessProbe:
                  httpGet:
                    path: /ready
                    port: http
                  initialDelaySeconds: 5
                  periodSeconds: 10
          ingress:
            annotations:
              nginx.ingress.kubernetes.io/proxy-body-size: "10m"
            hosts:
              - host: myapp.example.com
                paths:
                  - path: /
                    pathType: Prefix
    asserts:
      - matchSnapshot: {}

  - it: should create example app with HTTPRoute (Gateway API)
    set:
      generic:
        ingressesGeneral:
          domain: "example.org"
        httpRoutesGeneral:
          parentRefs:
            - name: shared-gateway
              namespace: gateway-system
      deployments:
        web-app:
          autoCreateService: true
          autoCreateHttpRoute: true
          containers:
            main:
              image: nginx
              imageTag: "1.25"
              ports:
                http:
                  containerPort: 80
                  servicePort: 80
          httpRoute:
            hostnames:
              - subdomain: web-app
            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          any: true
        template: deployment.yaml
      - containsDocument:
          kind: HTTPRoute
          apiVersion: gateway.networking.k8s.io/v1
          any: true
        template: deployment.yaml 