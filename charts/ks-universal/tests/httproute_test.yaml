suite: test httproute
templates:
  - httproute.yaml
tests:
  - it: should create an HTTPRoute with full configuration
    set:
      generic:
        ingressesGeneral:
          domain: "example.org"
        httpRoutesGeneral:
          parentRefs:
            - name: shared-gateway
              namespace: gateway-system
          annotations:
            global-annotation: "true"
      httpRoutes:
        my-app:
          hostnames:
            - subdomain: my-app
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /api
              backendRefs:
                - name: my-app
                  port: 8080
                  weight: 100
          annotations:
            custom-annotation: "true"
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1
      - equal:
          path: metadata.name
          value: my-app
      - equal:
          path: spec.parentRefs[0].name
          value: shared-gateway
      - equal:
          path: spec.parentRefs[0].namespace
          value: gateway-system
      - equal:
          path: spec.hostnames[0]
          value: my-app.example.org
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: PathPrefix
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /api
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: my-app
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8080
      - equal:
          path: spec.rules[0].backendRefs[0].weight
          value: 100
      - equal:
          path: metadata.annotations.custom-annotation
          value: "true"
      - equal:
          path: metadata.annotations.global-annotation
          value: "true"

  - it: should override global parentRefs with per-route parentRefs
    set:
      generic:
        ingressesGeneral:
          domain: "example.org"
        httpRoutesGeneral:
          parentRefs:
            - name: shared-gateway
              namespace: gateway-system
      httpRoutes:
        my-app:
          parentRefs:
            - name: custom-gateway
              namespace: custom-ns
              sectionName: https
          hostnames:
            - subdomain: my-app
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /
              backendRefs:
                - name: my-app
                  port: 8080
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: custom-gateway
      - equal:
          path: spec.parentRefs[0].namespace
          value: custom-ns
      - equal:
          path: spec.parentRefs[0].sectionName
          value: https

  - it: should use full host when specified
    set:
      generic:
        httpRoutesGeneral:
          parentRefs:
            - name: gw
              namespace: gw-ns
      httpRoutes:
        my-app:
          hostnames:
            - host: custom.example.com
          rules:
            - matches:
                - path:
                    type: Exact
                    value: /health
              backendRefs:
                - name: my-app
                  port: 3000
    asserts:
      - equal:
          path: spec.hostnames[0]
          value: custom.example.com

  - it: should default backendRef name to route name and port to 80
    set:
      generic:
        ingressesGeneral:
          domain: "example.org"
        httpRoutesGeneral:
          parentRefs:
            - name: gw
              namespace: gw-ns
      httpRoutes:
        my-svc:
          hostnames:
            - subdomain: my-svc
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: my-svc
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 80

  - it: should support multiple backendRefs with weights for traffic splitting
    set:
      generic:
        ingressesGeneral:
          domain: "example.org"
        httpRoutesGeneral:
          parentRefs:
            - name: gw
              namespace: gw-ns
      httpRoutes:
        canary-app:
          hostnames:
            - subdomain: app
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /
              backendRefs:
                - name: app-stable
                  port: 8080
                  weight: 90
                - name: app-canary
                  port: 8080
                  weight: 10
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: app-stable
      - equal:
          path: spec.rules[0].backendRefs[0].weight
          value: 90
      - equal:
          path: spec.rules[0].backendRefs[1].name
          value: app-canary
      - equal:
          path: spec.rules[0].backendRefs[1].weight
          value: 10

  - it: should render header and queryParam matches
    set:
      generic:
        ingressesGeneral:
          domain: "example.org"
        httpRoutesGeneral:
          parentRefs:
            - name: gw
              namespace: gw-ns
      httpRoutes:
        my-app:
          hostnames:
            - subdomain: my-app
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /api
                  headers:
                    - name: x-env
                      value: staging
                      type: Exact
                  queryParams:
                    - name: version
                      value: "2"
              backendRefs:
                - name: my-app
                  port: 8080
    asserts:
      - equal:
          path: spec.rules[0].matches[0].headers[0].name
          value: x-env
      - equal:
          path: spec.rules[0].matches[0].headers[0].value
          value: "staging"
      - equal:
          path: spec.rules[0].matches[0].headers[0].type
          value: Exact
      - equal:
          path: spec.rules[0].matches[0].queryParams[0].name
          value: version
      - equal:
          path: spec.rules[0].matches[0].queryParams[0].value
          value: "2"

  - it: should merge global and resource labels
    set:
      generic:
        labels:
          global-label: "true"
        ingressesGeneral:
          domain: "example.org"
        httpRoutesGeneral:
          parentRefs:
            - name: gw
              namespace: gw-ns
      httpRoutes:
        my-app:
          labels:
            app-label: "custom"
          hostnames:
            - subdomain: my-app
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /
    asserts:
      - equal:
          path: metadata.labels.global-label
          value: "true"
      - equal:
          path: metadata.labels.app-label
          value: "custom"