suite: test serviceaccount
templates:
  - deployment.yaml
  - serviceaccount.yaml
tests:
  - it: should create a service account when autoCreateServiceAccount is enabled
    set:
      deployments:
        test-app:
          containers:
            main:
              image: nginx
              imageTag: latest
          autoCreateServiceAccount: true
          serviceAccountConfig:
            annotations:
              example.com/role: "webserver"
    asserts:
      - matchSnapshot: {}

  - it: should use custom serviceAccountName when specified per-deployment
    templates:
      - deployment.yaml
    set:
      deployments:
        test-app:
          containers:
            main:
              image: nginx
              imageTag: latest
          serviceAccountName: custom-sa
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.serviceAccountName
          value: custom-sa

  - it: should use global serviceAccountName when specified in generic
    templates:
      - deployment.yaml
    set:
      generic:
        serviceAccountName: global-sa
      deployments:
        test-app:
          containers:
            main:
              image: nginx
              imageTag: latest
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.serviceAccountName
          value: global-sa

  - it: should override global serviceAccountName with per-deployment serviceAccountName
    templates:
      - deployment.yaml
    set:
      generic:
        serviceAccountName: global-sa
      deployments:
        test-app:
          containers:
            main:
              image: nginx
              imageTag: latest
          serviceAccountName: override-sa
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.serviceAccountName
          value: override-sa

  - it: should not set serviceAccountName when not configured
    templates:
      - deployment.yaml
    set:
      deployments:
        test-app:
          containers:
            main:
              image: nginx
              imageTag: latest
    asserts:
      - isKind:
          of: Deployment
      - isNull:
          path: spec.template.spec.serviceAccountName